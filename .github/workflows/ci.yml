name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    uses: browniebroke/github-actions/.github/workflows/ts-lint.yml@3ceed0e5ad20c6d9e64f46937b7c0425bbe51b54 # v1.24.0
  bundlewatch:
    uses: browniebroke/github-actions/.github/workflows/bundlewatch.yml@3ceed0e5ad20c6d9e64f46937b7c0425bbe51b54 # v1.24.0
    secrets:
      bundlewatch_token: ${{ secrets.BUNDLEWATCH_GITHUB_TOKEN }}
  deploy:
    uses: browniebroke/github-actions/.github/workflows/netlify-deploy.yml@3ceed0e5ad20c6d9e64f46937b7c0425bbe51b54 # v1.24.0
    with:
      netlify_site_id: '10c50357-1953-4307-9c1b-c40f1f826885'
      publish_dir: 'out'
    secrets:
      netlify_auth_token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
