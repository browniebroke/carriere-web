name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    uses: browniebroke/github-actions/.github/workflows/ts-lint.yml@a4a8428c6f76ab8848c94c5a649fa809aacf8688 # v1.23.0
  bundlewatch:
    uses: browniebroke/github-actions/.github/workflows/bundlewatch.yml@a4a8428c6f76ab8848c94c5a649fa809aacf8688 # v1.23.0
    secrets:
      bundlewatch_token: ${{ secrets.BUNDLEWATCH_GITHUB_TOKEN }}
  deploy:
    uses: browniebroke/github-actions/.github/workflows/netlify-deploy.yml@a4a8428c6f76ab8848c94c5a649fa809aacf8688 # v1.23.0
    with:
      netlify_site_id: '10c50357-1953-4307-9c1b-c40f1f826885'
      publish_dir: 'out'
    secrets:
      netlify_auth_token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
